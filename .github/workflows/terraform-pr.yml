name: 'Terraform PR'

on:
  # For testing
  # workflow_dispatch:
  # Real
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash
        working-directory: ./src/terraform-main-infra

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          src/terraform-main-infra
          src/ansible

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: "~>1.9.1"
        
    - name: Create authorized_key.json
      run: |
        cat > authorized_key.json << 'EOF'
        ${{ secrets.YC_AUTHORIZED_KEY }}
        EOF

    - name: Create backend.hcl
      run: |
        cat > backend.hcl << 'EOF'
        ${{ secrets.TERRAFORM_BACKEND }}
        EOF

    - name: Create personal.auto.tfvars
      run: |
        cat > personal.auto.tfvars << 'EOF'
        ${{ secrets.TERRAFORM_PERSONAL_VARS }}
        EOF

    - name: Create ssh public key files
      run: |
        mkdir -p ~/.ssh
        cat > ~/.ssh/vm_user.pub << 'EOF'
        ${{ secrets.SSH_PUBLIC_KEY_VM_USER }}
        EOF
        cat > ~/.ssh/cicd.pub << 'EOT'
        ${{ secrets.SSH_PUBLIC_KEY_CICD }}
        EOT
        chmod 700 ~/.ssh
        chmod 644 ~/.ssh/vm_user.pub
        chmod 644 ~/.ssh/cicd.pub
        cat > extra.tfvars << 'EOF'
        ssh_key_paths = ["~/.ssh/vm_user.pub", "~/.ssh/cicd.pub"]
        EOF
        
    - name: Terraform Init
      env:
        YC_BACKEND_ACCESS_KEY: ${{ secrets.YC_BACKEND_ACCESS_KEY }}
        YC_BACKEND_SECRET_KEY: ${{ secrets.YC_BACKEND_SECRET_KEY }}
      run: |
        echo ::add-mask::$YC_BACKEND_ACCESS_KEY
        echo ::add-mask::$YC_BACKEND_SECRET_KEY
        terraform init -backend-config="access_key=${YC_BACKEND_ACCESS_KEY}" -backend-config="secret_key=${YC_BACKEND_SECRET_KEY}" -backend-config=backend.hcl

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Plan
      if: github.event_name == 'pull_request'
      run: terraform plan -input=false -var-file=extra.tfvars

    - name: Terraform Apply
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -input=false -var-file=extra.tfvars

    - name: Upload inventory.ini
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: inventory.ini
        path: ${{ github.workspace }}/src/ansible/playbook/inventory/inventory.ini
        archive: false
    
    - name: Upload all.yaml
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: all.yaml
        path: ${{ github.workspace }}/src/ansible/playbook/inventory/group_vars/all.yaml
        archive: false
  ansible:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: terraform
    name: 'Ansible'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        shell: bash
        working-directory: ./src/ansible/playbook
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: src/ansible
      
      - name: Create ssh key files
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519.pub << 'EOF'
          ${{ secrets.SSH_PUBLIC_KEY_CICD }}
          EOF
          cat > ~/.ssh/id_ed25519 << 'EOF'
          ${{ secrets.SSH_PRIVATE_KEY_CICD }}
          EOF
          chmod 700 ~/.ssh
          chmod 644 ~/.ssh/id_ed25519.pub
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
      
      - name: Download all.yaml
        uses: actions/download-artifact@v8
        with:
          name: all.yaml
          path: inventory/group_vars
      
      - name: Download inventory.ini
        uses: actions/download-artifact@v8
        with:
          name: inventory.ini
          path: inventory

      - name: Check artifacts
        run: |
          cat inventory/inventory.ini
          cat inventory/group_vars/all.yaml
          
      - name: Create venv
        run: |
          python -m venv .venv
          source .venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
      
      - name: Install python requirements
        run: pip install -r venv_requirements.txt --quiet

      - name: Install ansible requirements
        run: ansible-galaxy install -r requirements.yaml
      
      - name: Add key to ssh agent
        run: |
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_ed25519

      - name: Run kubespray
        run: ansible-playbook -i inventory/inventory.ini -b main.yaml
