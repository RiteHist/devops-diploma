name: 'Terraform PR plan'

on:
  # For testing
  workflow_dispatch:
  # Real
  # pull_request:
  #   branches: [ "main" ]

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform plan'
    runs-on: ubuntu-latest
    environment: production
      
    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
        working-directory: ./src/terraform-main-infra

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4
      with:
        sparce-checkout: |
          src/terraform-main-infra
          src/ansible

    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: "~>1.9.1"
        
    - name: Create authorized_key.json
      run: |
        cat > authorized_key.json << 'EOF'
        ${{ secrets.YC_AUTHORIZED_KEY }}
        EOF

    - name: Create backend.hcl
      run: |
        cat > backend.hcl << 'EOF'
        ${{ secrets.TERRAFORM_BACKEND }}
        EOF

    - name: Create personal.auto.tfvars
      run: |
        cat > personal.auto.tfvars << 'EOF'
        ${{ secrets.TERRAFORM_PERSONAL_VARS }}
        EOF

    - name: Create ssh public key file
      run: |
        cat > ~/.ssh/id_ed25519.pub << 'EOF'
        ${{ secrets.SSH_PUBLIC_KEY }}
        EOF
        
    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      env:
        YC_BACKEND_ACCESS_KEY: ${{ secrets.YC_BACKEND_ACCESS_KEY }}
        YC_BACKEND_SECRET_KEY: ${{ secrets.YC_BACKEND_SECRET_KEY }}
      run: |
        echo ::add-mask::$YC_BACKEND_ACCESS_KEY
        echo ::add-mask::$YC_BACKEND_SECRET_KEY
        terraform init -backend-config="access_key=${YC_BACKEND_ACCESS_KEY}" -backend-config="secret_key=${YC_BACKEND_SECRET_KEY}" -backend-config=backend.hcl

    # Checks that all Terraform configuration files adhere to a canonical format
    - name: Terraform Format
      run: terraform fmt -check

    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false

      # On push to "main", build or change infrastructure according to Terraform configuration files
      # Note: It is recommended to set up a required "strict" status check in your repository for "Terraform Cloud". See the documentation on "strict" required status checks for more information: https://help.github.com/en/github/administering-a-repository/types-of-required-status-checks
    # - name: Terraform Apply
    #   if: github.ref == 'refs/heads/"main"' && github.event_name == 'push'
    #   run: terraform apply -auto-approve -input=false
